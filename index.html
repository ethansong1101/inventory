<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>東門庫存盤點系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        /* 低於庫存反紅樣式 */
        .low-stock-row { background-color: #fee2e2 !important; color: #b91c1c; font-weight: bold; }
        .header-bg { background: linear-gradient(135deg, #1e293b 0%, #334155 100%); }
        .info-text { font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; }
        .safety-tag { color: #2563eb; font-size: 0.75rem; font-weight: normal; margin-left: 4px; }
        .unit-text { font-size: 0.75rem; font-weight: 900; color: #475569; }
        .iphone-container { max-width: 430px; margin-left: auto; margin-right: auto; }
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        textarea { resize: none; overflow: hidden; min-height: 80px; }
        
        /* 增加手機點擊感 */
        .btn-active:active { transform: scale(0.98); }
    </style>
</head>
<body class="bg-gray-50 min-h-screen p-2 info-text">

    <div id="captureArea" class="iphone-container shadow-2xl rounded-2xl overflow-hidden mb-10 bg-white border border-gray-100">
        <!-- 頂部標題區域 -->
        <div class="header-bg text-white p-6 text-center">
            <h1 class="text-2xl font-bold tracking-widest mb-1">東門庫存盤點系統</h1>
            <p id="displayDate" class="text-sm opacity-90"></p>
        </div>

        <div class="p-4">
            <!-- 盤點人員與廠商資訊區塊 -->
            <div class="mb-6 border-b-2 border-gray-100 pb-4">
                <div class="flex items-center mb-4">
                    <label class="text-xl font-bold mr-2 text-gray-800 whitespace-nowrap">盤點人員：</label>
                    <input type="text" id="signer" class="text-xl border-b-2 border-gray-300 focus:border-blue-600 outline-none px-1 w-full bg-transparent" placeholder="請填寫姓名">
                </div>

                <div class="bg-slate-50 p-3 rounded-lg border border-slate-200">
                    <h3 class="text-sm font-bold text-slate-700 mb-1">叫貨廠商資訊</h3>
                    <div class="grid grid-cols-1 gap-y-0.5 text-sm text-slate-500">
                        <div class="flex justify-between"><span>養生堂</span> <span>03-6661399</span></div>
                        <div class="flex justify-between"><span>聯慶</span> <span>03-5225353</span></div>
                        <div class="flex justify-between"><span>ＸＯ醬</span> <span>06-9273596</span></div>
                        <div class="flex justify-between"><span>北浦辣椒</span> <span>0927-881136</span></div>
                        <div class="flex justify-between"><span>中華紙杯</span> <span>03-5436430</span></div>
                        <div class="flex justify-between"><span>千潔紙杯</span> <span>03-5364988</span></div>
                        <p class="text-xs text-blue-500 mt-1 font-medium">其餘廠商於 LINE 官方聯絡</p>
                    </div>
                </div>
                
                <div class="flex gap-2 mt-4">
                    <button onclick="copyData()" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg shadow-md transition btn-active text-sm text-center">複製回報文字</button>
                    <button onclick="exportExcel()" class="flex-1 bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-lg shadow-md transition btn-active text-sm text-center">匯出 Excel</button>
                </div>
            </div>

            <!-- 盤點列表動態插入 -->
            <div id="inventoryLists"></div>

            <!-- 自行輸入區塊 -->
            <div class="mt-8 space-y-6 pb-6">
                <!-- 今日叫貨 -->
                <div class="border-t-2 border-gray-100 pt-4">
                    <div class="flex items-center justify-between mb-2">
                        <h2 class="bg-orange-600 px-3 py-1.5 font-bold text-white rounded-lg text-base shadow-sm">今日叫貨紀錄</h2>
                        <input type="date" id="orderDate" class="text-sm border rounded px-1 text-gray-600">
                    </div>
                    <textarea id="orderNotes" class="w-full border border-gray-200 rounded-lg p-3 text-sm focus:border-orange-500 outline-none bg-orange-50/30" placeholder="請手動輸入今日叫貨品項..."></textarea>
                </div>

                <!-- 今日進貨 -->
                <div class="border-t-2 border-gray-100 pt-4">
                    <div class="flex items-center justify-between mb-2">
                        <h2 class="bg-green-600 px-3 py-1.5 font-bold text-white rounded-lg text-base shadow-sm">今日進貨紀錄</h2>
                        <input type="date" id="receiveDate" class="text-sm border rounded px-1 text-gray-600">
                    </div>
                    <textarea id="receiveNotes" class="w-full border border-gray-200 rounded-lg p-3 text-sm focus:border-green-500 outline-none bg-green-50/30" placeholder="請手動輸入今日到貨內容..."></textarea>
                </div>
            </div>
        </div>
    </div>

    <script>
        const today = new Date();
        const isoDate = today.toISOString().split('T')[0];
        const todayStr = today.toLocaleDateString('zh-TW', {year: 'numeric', month: 'long', day: 'numeric', weekday: 'long'});
        
        document.getElementById('displayDate').innerText = `盤點日期：${todayStr}`;
        document.getElementById('orderDate').value = isoDate;
        document.getElementById('receiveDate').value = isoDate;

        // 更新後的庫存數據配置
        const sections = [
            {
                name: "1F冷藏", alert: true,
                items: [
                    { n: "麵", u: "", s: 6 },
                    { n: "日式醬", u: "(瓶)", s: 8 },
                    { n: "美乃滋", u: "(瓶)", s: 4 },
                    { n: "高麗菜", u: "(袋)", s: 4 },
                    { n: "豆漿 有糖", u: "(包)", s: 4 },
                    { n: "豆漿 無糖", u: "(包)", s: 2 },
                    { n: "XO醬", u: "(罐)", s: 2 },
                    { n: "辣椒醬", u: "(罐)", s: 2 },
                    { n: "明太子", u: "", s: 1 }
                ]
            },
            {
                name: "1F冷凍", alert: true,
                items: [
                    { n: "雞塊", u: "(包)", s: 4 },
                    { n: "薯條", u: "(分裝袋)", s: 1 },
                    { n: "可樂餅", u: "(包)", s: 1 },
                    { n: "炸蝦", u: "(盒)", s: 1 },
                    { n: "甜不辣", u: "(包)", s: 1 },
                    { n: "花枝丸", u: "(包)", s: 1 },
                    { n: "雞排", u: "(包)", s: 2 },
                    { n: "超厚豬排", u: "(包)", s: 3 },
                    { n: "鹽酥杏鮑菇", u: "(包)", s: 1 },
                    { n: "唐揚雞", u: "(包)", s: 2 },
                    { n: "豬肉", u: "(包)", s: 3 },
                    { n: "牛肉", u: "(包)", s: 2 }
                ]
            },
            {
                name: "1F備品", alert: true,
                items: [
                    { n: "唐揚雞粉", u: "(包)", s: 2 },
                    { n: "新鍋子", u: "(個)", s: 2 },
                    { n: "10斤袋", u: "(包)", s: 1 },
                    { n: "3斤袋", u: "(包)", s: 1 },
                    { n: "6兩袋", u: "(包)", s: 1 },
                    { n: "3兩袋", u: "(包)", s: 1 },
                    { n: "黃袋", u: "(包)", s: 2 },
                    { n: "綠袋", u: "(包)", s: 2 },
                    { n: "紅袋", u: "(包)", s: 1 },
                    { n: "902碗", u: "(條)", s: 2 },
                    { n: "902蓋", u: "(條)", s: 2 }
                ]
            },
            {
                name: "B1冷藏", alert: true,
                items: [
                    { n: "麵", u: "", s: 6 },
                    { n: "唐揚雞粉", u: "(包)", s: 2 },
                    { n: "豆漿 有糖", u: "", s: 4 },
                    { n: "豆漿 無糖", u: "", s: 2 }
                ]
            },
            {
                name: "B1冷凍", alert: true,
                items: [
                    { n: "雞塊", u: "", s: 4 },
                    { n: "薯條", u: "(分裝)", s: 2 },
                    { n: "可樂餅", u: "", s: 2 },
                    { n: "炸蝦", u: "", s: 2 },
                    { n: "甜不辣", u: "", s: 2 },
                    { n: "花枝丸", u: "", s: 2 },
                    { n: "雞排", u: "", s: 3 },
                    { n: "超厚豬排", u: "", s: 5 },
                    { n: "鹽酥杏鮑菇", u: "", s: 2 },
                    { n: "唐揚雞", u: "", s: 4 },
                    { n: "豬肉", u: "", s: 4 },
                    { n: "牛肉", u: "", s: 3 }
                ]
            },
            {
                name: "B1備品", alert: true,
                items: [
                    { n: "XO醬", u: "", s: 6 },
                    { n: "辣椒醬", u: "", s: 5 },
                    { n: "LOC 清潔用", u: "", s: 3 },
                    { n: "LOC 廚房用", u: "", s: 2 },
                    { n: "LOC 洗碗用", u: "", s: 2 }
                ]
            }
        ];

        const container = document.getElementById('inventoryLists');

        function renderTables() {
            if (!container) return;
            if (sections.length === 0) {
                container.innerHTML = '<div class="text-center text-gray-400 py-12 border-2 border-dashed border-gray-200 rounded-xl">目前尚無品項。</div>';
                return;
            }
            container.innerHTML = "";
            sections.forEach(sec => {
                let tableHtml = `
                    <div class="mb-8">
                        <h2 class="bg-slate-800 px-3 py-1.5 font-bold text-white rounded-lg text-base shadow-sm inline-block">${sec.name}</h2>
                        <table class="w-full text-left mt-2 border-collapse" data-sec="${sec.name}">
                            <thead>
                                <tr class="text-xs text-gray-400 border-b">
                                    <th class="py-2 px-1">品項名稱</th><th class="w-24 text-center">盤點數量</th>
                                </tr>
                            </thead>
                            <tbody>
                `;
                sec.items.forEach(item => {
                    tableHtml += `
                        <tr class="border-b border-gray-50 last:border-0 transition">
                            <td class="py-3 px-1">
                                <span class="text-gray-800 font-bold text-sm item-name">${item.n}</span>
                                <span class="unit-text ml-0.5">${item.u}</span>
                                <span class="safety-tag">最低:${item.s}</span>
                            </td>
                            <td class="py-1 text-right">
                                <input type="number" 
                                    class="w-20 border border-gray-200 rounded-lg p-2 text-center font-bold text-blue-800 text-xl focus:border-blue-500 outline-none qty-input bg-gray-50"
                                    data-name="${item.n}"
                                    data-unit="${item.u}"
                                    data-safety="${item.s}" 
                                    data-alert="${sec.alert}"
                                    inputmode="numeric"
                                    oninput="validate(this)">
                            </td>
                        </tr>
                    `;
                });
                tableHtml += `</tbody></table></div>`;
                container.innerHTML += tableHtml;
            });
        }

        function validate(el) {
            const val = parseFloat(el.value);
            const safety = parseFloat(el.dataset.safety);
            const needsAlert = el.dataset.alert === "true";
            const row = el.closest('tr');
            if (needsAlert && !isNaN(val) && val < safety) {
                row.classList.add('low-stock-row');
            } else {
                row.classList.remove('low-stock-row');
            }
        }

        async function copyData() {
            const signer = document.getElementById('signer').value || "未簽名";
            let text = `📦 【東門店庫存盤點】\n📅 日期：${todayStr}\n👤 人員：${signer}\n━━━━━━━━━━━━━━\n`;
            
            const tables = document.querySelectorAll('table');
            if (tables.length === 0) {
                text += "\n(無盤點資料)\n";
            } else {
                tables.forEach(table => {
                    text += `\n【${table.dataset.sec}】\n`;
                    table.querySelectorAll('tbody tr').forEach(row => {
                        const name = row.querySelector('.item-name').innerText;
                        const unit = row.querySelector('.unit-text').innerText;
                        const input = row.querySelector('.qty-input');
                        const val = input.value;
                        const isLow = row.classList.contains('low-stock-row');
                        
                        const prefix = isLow ? `🚨 ` : ``;
                        
                        if(val !== "") {
                            text += `${prefix}${name} ${unit}：${val}\n`;
                        } else {
                            text += `${prefix}${name} ${unit}：\n`;
                        }
                    });
                });
            }

            const orders = document.getElementById('orderNotes').value.trim();
            const receives = document.getElementById('receiveNotes').value.trim();
            const orderDate = document.getElementById('orderDate').value;
            const receiveDate = document.getElementById('receiveDate').value;

            text += `\n━━━━━━━━━━━━━━\n📝 今日叫貨 (${orderDate})\n${orders || "(無)"}\n`;
            text += `\n━━━━━━━━━━━━━━\n🚚 今日進貨 (${receiveDate})\n${receives || "(無)"}\n`;

            try {
                const textArea = document.createElement("textarea");
                textArea.value = text;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                document.body.removeChild(textArea);
                showToast("✅ 資料已複製到剪貼簿");
            } catch (err) {
                alert("複製失敗，請手動選取文字");
            }
        }

        function exportExcel() {
            const signer = document.getElementById('signer').value || "未簽名";
            const exportData = [
                ["東門庫存盤點表"], ["盤點日期", todayStr], ["盤點人員", signer], [],
                ["區域", "品項", "盤點數量", "單位", "最低庫存", "狀態"]
            ];

            const tables = document.querySelectorAll('table');
            tables.forEach(table => {
                const area = table.dataset.sec;
                table.querySelectorAll('tbody tr').forEach(row => {
                    const name = row.querySelector('.item-name').innerText;
                    const unit = row.querySelector('.unit-text').innerText;
                    const input = row.querySelector('.qty-input');
                    const qty = input.value;
                    const safety = input.dataset.safety;
                    const status = row.classList.contains('low-stock-row') ? "🚨 庫存不足" : (qty === "" ? "-" : "正常");
                    exportData.push([area, name, qty, unit, safety, status]);
                });
            });

            const orders = document.getElementById('orderNotes').value.trim();
            const receives = document.getElementById('receiveNotes').value.trim();
            exportData.push([], ["備註項目"]);
            exportData.push(["今日叫貨", orders || "無"]);
            exportData.push(["今日進貨", receives || "無"]);

            const wb = XLSX.utils.book_new();
            const ws = XLSX.utils.aoa_to_sheet(exportData);
            XLSX.utils.book_append_sheet(wb, ws, "庫存數據");
            XLSX.writeFile(wb, `東門盤點_${new Date().toISOString().split('T')[0]}.xlsx`);
        }

        function showToast(msg) {
            const toast = document.createElement('div');
            toast.className = "fixed bottom-10 left-1/2 -translate-x-1/2 bg-gray-800 text-white px-6 py-3 rounded-xl text-sm z-50 text-center shadow-lg";
            toast.innerText = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }

        window.addEventListener('DOMContentLoaded', () => {
            renderTables();
            document.querySelectorAll('textarea').forEach(ta => {
                ta.addEventListener('input', function() {
                    this.style.height = 'auto';
                    this.style.height = (this.scrollHeight) + 'px';
                });
            });
        });
    </script>
</body>
</html>
